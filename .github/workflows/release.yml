name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build frontend
        run: |
          cd zeelo
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm install
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript
          pnpm --filter client exec node scripts/copyAssets.mjs
          pnpm --filter client exec panda codegen
          pnpm --filter client build

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          
      - name: Debug env
        run: |
          Write-Host "KEY: $($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars"
          Write-Host "PASS: $($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Length) chars"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Debug key
        run: |
          Write-Host "Key length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Write-Host "Key start: $($env:TAURI_SIGNING_PRIVATE_KEY.Substring(0, [Math]::Min(20, $env:TAURI_SIGNING_PRIVATE_KEY.Length)))"
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Write signing key
        run: |
          $dir = "C:\Users\runneradmin\.tauri"
          if (-not (Test-Path $dir)) { md $dir }
          $key = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          Set-Content -Path "C:\Users\runneradmin\.tauri\zeelo.key" -Value $key -NoNewline
        shell: pwsh

      - name: Set signing key env
        run: |
          $raw = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String((Get-Content "C:\Users\runneradmin\.tauri\zeelo.key" -Raw).Trim()))
          echo "TAURI_SIGNING_PRIVATE_KEY=$raw" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri