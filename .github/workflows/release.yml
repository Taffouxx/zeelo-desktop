name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build frontend
        run: |
          cd zeelo
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm install
          pnpm --filter stoat.js build
          pnpm --filter solid-livekit-components build
          pnpm --filter @lingui-solid/babel-plugin-lingui-macro build
          pnpm --filter @lingui-solid/babel-plugin-extract-messages build
          pnpm --filter client exec lingui compile --typescript
          pnpm --filter client exec node scripts/copyAssets.mjs
          pnpm --filter client exec panda codegen
          pnpm --filter client build

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Debug key
        run: |
          Write-Host "Key length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Write-Host "Key start: $($env:TAURI_SIGNING_PRIVATE_KEY.Substring(0, [Math]::Min(20, $env:TAURI_SIGNING_PRIVATE_KEY.Length)))"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle files
        run: |
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File | ForEach-Object { Write-Host $_.FullName }
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          generate_release_notes: true